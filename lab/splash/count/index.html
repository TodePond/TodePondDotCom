<script type="module">
  const splashSpans = document.querySelectorAll(".splash");
  const splashOverrideSpans = document.querySelectorAll(".splash-override");

  function getHexFromSplash(splash) {
    const splashChannels = splash.toString().trim().padStart(3, "0").split("");
    const rgbChannels = splashChannels.map((v) => Math.floor((v / 9) * 255));
    const hexChannels = rgbChannels.map((v) => v.toString(16).padStart(2, "0"));
    return "#" + hexChannels.join("");
  }

  function applySplashToElement({ element, splash, theme }) {
    const hex =
      theme === "cellpond"
        ? getCellpondHexFromSplash(splash)
        : getHexFromSplash(splash);
    element.style.backgroundColor = hex;
    if (hex === "#000000") {
      element.style.outline = "1px solid white";
    } else {
      element.style.outline = "none";
    }
  }

  const cellpondSpans = document.querySelectorAll(".cellpond-splash");

  splashSpans.forEach((span) => {
    applySplashToElement({ element: span, splash: span.textContent });
  });

  splashOverrideSpans.forEach((span) => {
    applySplashToElement({
      element: span,
      splash: span.getAttribute("value"),
    });
  });

  const numberInput = document.querySelector("#number-input");
  const numberTarget = document.querySelector("#number-target");
  const numberShuffle = document.querySelector("#number-shuffle");

  const themeToggle = document.querySelector("#theme-checkbox");

  const redRange = document.querySelector("#red-range");
  const greenRange = document.querySelector("#green-range");
  const blueRange = document.querySelector("#blue-range");

  const splashOutput = document.querySelector("#splash-output");
  const hexOutput = document.querySelector("#hex-output");
  const rgbOutput = document.querySelector("#rgb-output");

  function updatePreview() {
    const value = parseInt(numberInput.value, 10);
    applySplashToElement({
      element: numberTarget,
      splash: value,
      theme: themeToggle.checked ? "cellpond" : undefined,
    });
    if (themeToggle.checked) {
      numberTarget.classList.add("cellpond-splash");
    } else {
      numberTarget.classList.remove("cellpond-splash");
    }
    numberTarget.textContent = value.toString().padStart(3, "0");
    updateSelects();
    updateRanges();
    hexOutput.textContent = themeToggle.checked
      ? getCellpondHexFromSplash(value)
      : getHexFromSplash(value);

    splashOutput.textContent = value.toString().padStart(3, "0");
    rgbOutput.textContent = hexToRgb(hexOutput.textContent);

    const splashRange = document.querySelector("#splash-range");
    splashRange.value = value;
  }

  function updateFromRanges() {
    const red = parseInt(redRange.value, 10);
    const green = parseInt(greenRange.value, 10);
    const blue = parseInt(blueRange.value, 10);
    const value = red * 100 + green * 10 + blue;
    numberInput.value = value;
    updatePreview();
  }

  // redRange.addEventListener("input", updateFromRanges);

    const value = parseInt(numberInput.value, 10);

  const selectGreen = document.querySelector("#splash-select-green");

  function updateFromSelects() {
    const red = parseInt(selectRed.value, 10);
    const green = parseInt(selectGreen.value, 10);
    const blue = parseInt(selectBlue.value, 10);
    const value = red * 100 + green * 10 + blue;

  const cellpondReds = [23, 55, 70, 98, 128, 159, 174, 204, 242, 255];
  const cellpondGreens = [29, 67, 98, 128, 159, 174, 204, 222, 245, 255];
  const cellpondBlues = [40, 70, 98, 128, 159, 174, 204, 222, 247, 255];

  const cellpondHexRed = cellpondReds.map((red) => {
    return red.toString(16).padStart(2, "0");
  });

  const cellpondHexGreen = cellpondGreens.map((green) => {
    return green.toString(16).padStart(2, "0");
  });

  const cellpondHexBlue = cellpondBlues.map((blue) => {
    return blue.toString(16).padStart(2, "0");
  });

  const cellpondValues = [cellpondHexRed, cellpondHexGreen, cellpondHexBlue];

  // console.log("REDs", cellpondHexRed);
  // console.log("GREENs", cellpondHexGreen);
  // console.log("BLUEs", cellpondHexBlue);

  function getCellpondHexFromSplash(splash) {
    const splashChannels = splash.toString().padStart(3, "0").trim().split("");
    // console.log(splashChannels);
    const hexChannels = splashChannels.map((v, i) => {
      return cellpondValues[i][v];
    });

    return "#" + hexChannels.join("");
  }

  cellpondSpans.forEach((span) => {
    applySplashToElement({
      element: span,
      splash: span.textContent,
      theme: "cellpond",
    });
  });

  const copyButtonSplash = document.querySelector("#copy-button-splash");
  const copyButton = document.querySelector("#copy-button");
  const copyButtonRgb = document.querySelector("#copy-button-rgb");

  let copiesSplash = 0;

  let copiesRgb = 0;

  function hexToRgb(hex) {
    const hexChannels = hex.slice(1).match(/.{1,2}/g);
    const rgbChannels = hexChannels.map((v) => parseInt(v, 16));
    return `rgb(${rgbChannels.join(", ")})`;
  }

  // const SPLASH_TO_HEX = [];
  // for (let i = 0; i < 1000; i++) {
  //   SPLASH_TO_HEX[i] = getHexFromSplash(i);
  // }
  // window.SPLASH_TO_HEX = SPLASH_TO_HEX.map((v) => `"${v}"`).join(", ");

  const main = document.querySelector("main");

  let currentValue = parseInt(main.textContent);

  addEventListener("pointerdown", (e) => {
    e.preventDefault();
    e.stopPropagation();
    bumpCount();
  });

  addEventListener("keydown", (e) => {
    if (e.key === "ArrowRight") {
      bumpCount();
    }
    if (e.key === "ArrowLeft") {
      currentValue--;

      if (currentValue < 0) {
        currentValue = 999;
      }

      const paddedValue = currentValue.toString().padStart(3, "0");

      main.textContent = paddedValue;
      main.setAttribute("data-after", paddedValue);
      main.setAttribute("data-before", paddedValue);
    }

    // Refresh splash element bg colours
    applySplashToElement({
      element: main,
      splash: currentValue,
      // theme: themeToggle.checked ? "cellpond" : undefined,
    });

    // Copy hex to clipboard
    const hexOfCurrentValue = getHexFromSplash(currentValue);
    navigator.clipboard.writeText(hexOfCurrentValue);
  });

  function bumpCount() {
    currentValue++;

    if (currentValue > 999) {
      currentValue = 0;
    }

    const paddedValue = currentValue.toString().padStart(3, "0");

    main.textContent = paddedValue;
    main.setAttribute("data-after", paddedValue);
    main.setAttribute("data-before", paddedValue);

    applySplashToElement({
      element: main,
      splash: currentValue,
      // theme: themeToggle.checked ? "cellpond" : undefined,
    });

    const hexOfCurrentValue = getHexFromSplash(currentValue);
    navigator.clipboard.writeText(hexOfCurrentValue);
  }
